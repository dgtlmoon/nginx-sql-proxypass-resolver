version: '3'
services:

  nginx:
    hostname: nginx
    image: nginx:1
    networks:
      - test_net
    ports:
      - 80:80
    volumes:
      - ./example/nginx.conf/:/etc/nginx/conf.d/example.conf

  sqlite-dns-resolver:
    build: sqlite-dns-resolver
    hostname: sqlite-dns-resolver
    environment:
      # SQLite (default) — note the async driver prefix:
      DATABASE_URL: sqlite+aiosqlite:////data.db
      SQL_QUERY: "SELECT dest_addr FROM lookup WHERE name IS NOT NULL AND name LIKE :name"
      DNS_TTL: "60"
      CACHE_SIZE: "512"
      # MySQL example:
      # DATABASE_URL: mysql+asyncmy://user:pass@mysql-host/dbname
      # PostgreSQL example:
      # DATABASE_URL: postgresql+asyncpg://user:pass@pg-host/dbname
    volumes:
      - ./sqlite-dns-resolver:/app
      - ./example/test-data.db:/data.db
    command: /usr/local/bin/python3 /app/server.py
    networks:
      - test_net

  # Fallback one, a request for http://127.0.0.1/test-container should fallback and resolve here
  test-container:
    image: aikain/simplehttpserver:0.1
    hostname: test-container
    ports:
      - "8080:80"
    volumes:
      - ./example/test.html:/var/www/test-container
    networks:
      - test_net

networks:
  test_net:

